services:
  go2_ros2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go2_navigation
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    volumes:
      - /home/unitree/go2_ws:/ros2_ws
      - ./cyclonedds.xml:/cyclonedds.xml:ro
    environment:
      - ROS_DOMAIN_ID=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/cyclonedds.xml
    command: /bin/bash
