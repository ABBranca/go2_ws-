services:
  # -- Production service -------------------------------------------------------
  # docker compose up -d  →  builds image (if needed) and starts full nav stack
  go2_navigation:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: go2_navigation
    restart: unless-stopped
    network_mode: host
    ipc: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    stdin_open: true
    tty: true
    volumes:
      - ./cyclonedds.xml:/cyclonedds.xml:ro
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - CYCLONEDDS_URI=file:///cyclonedds.xml
    # CMD from Dockerfile launches bringup.launch.py — no override here

  # -- Development service ------------------------------------------------------
  # docker compose --profile dev up -d  →  interactive shell with source mount
  go2_navigation_dev:
    profiles: ["dev"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder   # uses the builder stage — has colcon, cmake, g++
    container_name: go2_navigation_dev
    network_mode: host
    ipc: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    stdin_open: true
    tty: true
    volumes:
      - ..:/ros2_ws
      - ./cyclonedds.xml:/cyclonedds.xml:ro
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - CYCLONEDDS_URI=file:///cyclonedds.xml
    command: bash
